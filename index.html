<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="拣货系统">
<meta name="theme-color" content="#1D9E75">
<title>拣货系统</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<style>
:root {
  --green:#1D9E75; --green-dark:#085041; --green-light:#E1F5EE; --green-mid:#9FE1CB;
  --red:#A32D2D; --red-light:#FCEBEB; --red-border:#F09595;
  --amber:#BA7517; --amber-light:#FAEEDA; --amber-border:#FAC775;
  --blue:#185FA5; --blue-light:#E6F1FB; --blue-border:#B5D4F4;
  --gray:#5F5E5A; --gray-light:#F1EFE8;
  --success-border:#C0DD97; --success-light:#EAF3DE; --success:#3B6D11;
  --bg:#F5F5F3; --surface:#FFFFFF;
  --border:rgba(0,0,0,0.1); --border-md:rgba(0,0,0,0.18);
  --text:#1a1a18; --text-2:#6b6b67; --text-3:#9a9a96;
  --radius:10px; --radius-lg:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;color:var(--text)}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}

.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--text-2);margin-top:1px}
.back-btn{background:none;border:none;font-size:15px;color:var(--green);cursor:pointer;padding:4px 0;font-weight:500;display:flex;align-items:center;gap:4px}

.tabbar{background:var(--surface);border-top:0.5px solid var(--border);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;padding-bottom:var(--safe-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;cursor:pointer;gap:3px;border:none;background:none}
.tab-icon{font-size:20px;line-height:1}
.tab-label{font-size:10px;color:var(--text-3);font-weight:500}
.tab-item.active .tab-label{color:var(--green)}
.tab-dot{width:8px;height:8px;border-radius:50%;background:#E24B4A;margin-top:1px;display:none}
.tab-item.has-badge .tab-dot{display:block}

.content{flex:1;overflow-y:auto;padding:0 0 calc(70px + var(--safe-bottom))}
.page{display:none}
.page.active{display:block}

.section-header{padding:20px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:22px;font-weight:700}

.card{background:var(--surface);border-radius:var(--radius-lg);margin:0 16px 10px;overflow:hidden;border:0.5px solid var(--border)}
.card-row{padding:13px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;transition:background .1s}
.card-row:last-child{border-bottom:none}
.card-row:active{background:var(--bg)}
.card-plain{padding:14px 16px}

.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-pend{background:var(--gray-light);color:var(--gray)}
.b-pick{background:var(--amber-light);color:var(--amber)}
.b-done{background:var(--success-light);color:var(--success)}
.b-out{background:var(--red-light);color:var(--red)}
.b-sub{background:var(--blue-light);color:var(--blue)}

.btn{padding:9px 16px;border-radius:var(--radius);border:0.5px solid var(--border-md);background:var(--surface);font-size:14px;cursor:pointer;font-weight:500;color:var(--text);-webkit-appearance:none;transition:opacity .1s}
.btn:active{opacity:.7}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green-dark)}
.btn-full{width:100%;text-align:center}
.btn-success{background:var(--success-light);color:var(--success);border-color:var(--success-border)}
.btn-warn{background:var(--amber-light);color:var(--amber);border-color:var(--amber-border)}
.btn-danger{background:var(--red-light);color:var(--red);border-color:var(--red-border)}
.btn-ghost{background:var(--bg);color:var(--text-2);border-color:var(--border)}

.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

.stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:12px 16px 4px}
.stat-card{background:var(--bg);border-radius:var(--radius);padding:10px 12px}
.stat-label{font-size:11px;color:var(--text-2);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700}

.pick-list{padding:0 16px}
.pick-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 14px;margin-bottom:9px;transition:all .2s}
.pick-item.is-done{background:var(--success-light);border-color:var(--success-border)}
.pick-item.is-out{background:var(--red-light);border-color:var(--red-border)}
.pick-item.is-sub{background:var(--blue-light);border-color:var(--blue-border)}
.pick-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.pick-num{font-size:11px;font-weight:600;color:var(--green);margin-bottom:3px}
.pick-desc{font-size:14px;font-weight:500;line-height:1.35}
.pick-meta{font-size:11px;color:var(--text-2);margin-top:4px}
.pick-right{text-align:right;flex-shrink:0}
.pick-qty{font-size:18px;font-weight:700}
.pick-uom{font-size:11px;color:var(--text-2)}
.pick-actions{display:flex;gap:7px;flex-wrap:wrap}
.sub-input-row{display:flex;gap:7px;margin-top:8px}
.sub-input-row input{flex:1;padding:8px 11px;border:0.5px solid var(--border-md);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);-webkit-appearance:none}
.sub-input-row input:focus{outline:none;box-shadow:0 0 0 2px var(--green-mid);border-color:var(--green)}
.sub-note{font-size:12px;color:var(--blue);margin-top:6px}

.report-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s}
.report-row:last-child{border-bottom:none}
.report-row:active{background:var(--bg)}
.report-row-left{flex:1;min-width:0}
.report-row-id{font-size:15px;font-weight:600}
.report-row-date{font-size:12px;color:var(--text-2);margin-top:2px}
.report-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.report-match-hint{font-size:12px;color:var(--text-2);margin-top:5px}
.chevron{color:var(--text-3);font-size:17px;flex-shrink:0}

.r-section-title{font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin:18px 16px 8px}
.r-item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--border)}
.r-item-row:last-child{border-bottom:none}
.r-item-row.hl-row{background:#FFFBEB}
.r-item-num{font-size:11px;font-weight:600;color:var(--green);margin-bottom:2px}
.r-item-desc{font-size:13px;line-height:1.35}
.r-item-sub{font-size:12px;color:var(--blue);margin-top:3px}
.r-item-right{text-align:right;flex-shrink:0}
.r-item-qty{font-size:14px;font-weight:600}
.r-item-user{font-size:11px;color:var(--text-2);margin-top:2px}

.search-wrap{position:relative;margin:10px 16px 6px}
.search-wrap input{width:100%;padding:10px 36px;border:0.5px solid var(--border-md);border-radius:var(--radius);font-size:15px;background:var(--surface);color:var(--text);-webkit-appearance:none}
.search-wrap input:focus{outline:none;box-shadow:0 0 0 2px var(--green-mid);border-color:var(--green)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text-3);pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--text-3);color:#fff;border:none;width:18px;height:18px;border-radius:50%;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
.search-meta{font-size:12px;color:var(--text-2);padding:2px 16px 8px}
.highlight{background:#FEF08A;color:#713f12;border-radius:2px;padding:0 1px}

.upload-zone{border:1.5px dashed var(--border-md);border-radius:var(--radius-lg);padding:24px 16px;text-align:center;cursor:pointer;margin:0 16px 16px;background:var(--surface)}
.upload-zone:active{border-color:var(--green);background:var(--green-light)}
.upload-zone-icon{font-size:28px;color:var(--text-3);margin-bottom:8px}
.upload-zone-text{font-size:14px;color:var(--text-2);font-weight:500}
.upload-zone-sub{font-size:12px;color:var(--text-3);margin-top:4px}
input[type="file"]{display:none}

.empty-state{text-align:center;padding:48px 24px;color:var(--text-2)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:500}
.empty-sub{font-size:13px;color:var(--text-3);margin-top:6px}

.finish-area{padding:12px 16px 0}

/* sync indicator */
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:5px;transition:background .3s}
.sync-dot.live{background:var(--green)}
.sync-dot.error{background:var(--red)}

.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,0.92);color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Loading overlay */
.loading{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;font-size:14px;color:var(--text-2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>连接服务器...</span>
</div>

<!-- TOP BAR -->
<div class="topbar" id="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="back-btn" id="backBtn" style="display:none" onclick="handleBack()">‹ 返回</button>
    <div>
      <div class="topbar-title" id="topbarTitle">拣货系统</div>
      <div id="topbarSub" style="font-size:12px;color:var(--text-2);margin-top:1px;display:none"></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="sync-dot" id="syncDot" title="实时连接状态"></span>
    <div id="topbarRight"></div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="page active" id="page-orders">
    <div class="section-header">
      <span class="section-title">首页</span>
    </div>
    <div style="padding:0 16px 16px">

      <div style="font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">拣货</div>
      <div class="card" onclick="goToOrders()" style="cursor:pointer;margin-bottom:8px">
        <div class="card-row" style="gap:14px">
          <div style="width:44px;height:44px;border-radius:var(--radius);background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px">📦</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:500;color:var(--text)">待拣订单</div>
            <div style="font-size:12px;color:var(--text-2);margin-top:2px" id="homeOrderSub">载入中...</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge b-out" id="homeOrderBadge" style="display:none"></span>
            <span style="color:var(--text-3);font-size:18px">›</span>
          </div>
        </div>
      </div>
      <div class="card" onclick="goToReports()" style="cursor:pointer;margin-bottom:8px">
        <div class="card-row" style="gap:14px">
          <div style="width:44px;height:44px;border-radius:var(--radius);background:#E6F1FB;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px">📋</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:500;color:var(--text)">拣货报告</div>
            <div style="font-size:12px;color:var(--text-2);margin-top:2px" id="homeReportSub">载入中...</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="color:var(--text-3);font-size:18px">›</span>
          </div>
        </div>
      </div>

      <div style="font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:20px">其他功能</div>
      <div style="color:var(--text-3);font-size:13px;padding:12px 4px">更多功能即将推出</div>

    </div>
  </div>

  <div class="page" id="page-order-list">
    <div class="section-header">
      <span class="section-title">待拣订单</span>
      <span class="badge b-pend" id="orderCountBadge"></span>
    </div>
    <div id="orderListContent"></div>
  </div>

  <div class="page" id="page-picking">
    <div class="stats-grid" id="pickStats"></div>
    <div class="pick-list" id="pickItems"></div>
    <div class="finish-area">
      <button class="btn btn-primary btn-full" onclick="finishPicking()">完成拣货，生成报告</button>
    </div>
  </div>

  <div class="page" id="page-reports">
    <div class="section-header"><span class="section-title">拣货报告</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="reportSearch" placeholder="搜索订单号或品项..." oninput="onSearch(this)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-meta" id="searchMeta"></div>
    <div class="card" id="reportListCard"></div>
  </div>

  <div class="page" id="page-report-detail">
    <div class="stats-grid" id="detailStats"></div>
    <div id="detailContent"></div>
  </div>


  <div class="page" id="page-stock">
    <div id="stock-group-view">
      <div class="section-header"><span class="section-title">库存</span></div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="stockGlobalSearch" placeholder="搜索所有商品名称或代码..." oninput="onStockGlobalSearch(this)">
        <button class="search-clear" id="stockGlobalSearchClear" onclick="clearStockGlobalSearch()">✕</button>
      </div>
      <div class="search-meta" id="stockGlobalSearchMeta"></div>
      <div id="stockGlobalResults" style="display:none">
        <div class="card" id="stockGlobalList"></div>
      </div>
      <div id="stockGroupSection">
        <div style="padding:0 16px 8px;font-size:13px;color:var(--text-2)">选择商品组别</div>
        <div id="stockGroupList"></div>
      </div>
    </div>
    <div id="stock-items-view" style="display:none">
      <div class="search-wrap" style="margin-top:10px">
        <span class="search-icon">🔍</span>
        <input type="text" id="stockSearch" placeholder="搜索商品名称或代码..." oninput="onStockSearch(this)">
        <button class="search-clear" id="stockSearchClear" onclick="clearStockSearch()">✕</button>
      </div>
      <div class="search-meta" id="stockSearchMeta"></div>
      <div class="card" id="stockItemsList"></div>
    </div>
  </div>
  <div class="page" id="page-admin">
    <div class="section-header"><span class="section-title">后台管理</span></div>
    <p style="font-size:13px;color:var(--text-2);padding:0 16px 12px">上传 Excel 文件，文件名自动成为订单号</p>
    <label for="fileInput">
      <div class="upload-zone">
        <div class="upload-zone-icon">📂</div>
        <div class="upload-zone-text">点击上传订单 Excel</div>
        <div class="upload-zone-sub">.xlsx 格式 · 含 Numbering, Description, Qty, User UOM 列</div>
      </div>
    </label>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFileUpload(this)">
    <div style="padding:4px 16px 8px;font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-top:4px">已载入订单</div>
    <div class="card" id="adminOrderList"></div>

    <div style="height:0.5px;background:var(--border);margin:1.5rem 0"></div>
    <div style="font-size:14px;font-weight:500;margin-bottom:8px;color:var(--text)">更新库存</div>
    <p style="font-size:13px;color:var(--text-2);padding-bottom:12px">上传最新库存 Excel，自动替换现有数据</p>
    <label for="stockFileInput">
      <div class="upload-zone">
        <div class="upload-zone-icon">📊</div>
        <div class="upload-zone-text">点击上传库存 Excel</div>
        <div class="upload-zone-sub">.xlsx 格式 · 含商品代码、名称、基本UOM、剩余总量等列</div>
      </div>
    </label>
    <input type="file" id="stockFileInput" accept=".xlsx,.xls" onchange="handleStockUpload(this)">
    <div class="card" id="adminStockInfo" style="margin-top:10px;display:none">
      <div class="card-plain" id="adminStockInfoContent"></div>
    </div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tab-item active" id="tab-orders" onclick="switchMainTab('orders')">
    <span class="tab-icon">🏠</span>
    <span class="tab-label">首页</span>
    <span class="tab-dot"></span>
  </button>
  <button class="tab-item" id="tab-reports" onclick="switchMainTab('reports')">
    <span class="tab-icon">📋</span>
    <span class="tab-label">报告</span>
    <span class="tab-dot"></span>
  </button>
  <button class="tab-item" id="tab-stock" onclick="switchMainTab('stock')">
    <span class="tab-icon">🗄️</span>
    <span class="tab-label">库存</span>
    <span class="tab-dot"></span>
  </button>
  <button class="tab-item" id="tab-admin" onclick="switchMainTab('admin')">
    <span class="tab-icon">⚙️</span>
    <span class="tab-label">管理</span>
    <span class="tab-dot"></span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────
// API address comes from config.js (edit that file with your Railway URL)
const API = window.BACKEND_URL || '';

// ─── STATE ───────────────────────────────────────────────
const S = {
  tab: 'orders',
  pageStack: [],
  currentOrder: null,
  currentReport: null,
  searchQuery: '',
  orders: [],
  reports: []
};

// ─── API CALLS ───────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadAll() {
  const [orders, reports] = await Promise.all([
    apiFetch('/api/orders'),
    apiFetch('/api/reports')
  ]);
  S.orders  = orders;
  S.reports = reports;
}

// ─── SSE REAL-TIME ───────────────────────────────────────
let _sseInstance = null;

function connectSSE() {
  if (_sseInstance) { try { _sseInstance.close(); } catch {} _sseInstance = null; }
  const es = new EventSource(API + '/api/events');
  _sseInstance = es;
  const dot = document.getElementById('syncDot');

  es.onopen = () => dot.className = 'sync-dot live';
  es.onerror = () => {
    dot.className = 'sync-dot error';
    _sseInstance = null;
    setTimeout(connectSSE, 4000);
    es.close();
  };

  es.addEventListener('orders_updated', e => {
    S.orders = JSON.parse(e.data);
    if (S.tab === 'orders') updateHomePage();
    if (currentPageId() === 'order-list') renderOrderList();
    if (S.tab === 'admin')  renderAdminList();
    if (currentPageId() === 'picking') renderPicking();
  });

  es.addEventListener('item_updated', e => {
    const { orderId, item } = JSON.parse(e.data);
    const order = S.orders.find(o => o.id === orderId);
    if (!order) return;
    const idx = order.items.findIndex(i => i.id === item.id);
    if (idx >= 0) order.items[idx] = item;
    if (currentPageId() === 'picking' && S.currentOrder === orderId) renderPicking();
    if (S.tab === 'orders') renderOrderList();
  });

  es.addEventListener('stock_updated', e => {
    const data = JSON.parse(e.data);
    stockState.items     = data.items     || [];
    stockState.updatedAt = data.updatedAt || null;
    stockState.filename  = data.filename  || null;
    if (S.tab === 'stock') renderStockGroups();
    updateAdminStockInfo();
  });

  es.addEventListener('report_created', e => {
    S.reports.unshift(JSON.parse(e.data));
    if (S.tab === 'reports') renderReportList();
    updateHomePage();
  });
}

// ─── NAVIGATION ──────────────────────────────────────────
function currentPageId() {
  const a = document.querySelector('.page.active');
  return a ? a.id.replace('page-', '') : 'orders';
}
function showPage(id, title, sub) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('topbarTitle').textContent = title || '拣货系统';
  const subEl = document.getElementById('topbarSub');
  if (sub) { subEl.textContent = sub; subEl.style.display = 'block'; }
  else subEl.style.display = 'none';
  document.getElementById('topbarRight').innerHTML = '';
}
function pushPage(id, title, sub) {
  S.pageStack.push({ id: currentPageId(), title: document.getElementById('topbarTitle').textContent, sub: document.getElementById('topbarSub').textContent });
  showPage(id, title, sub);
  document.getElementById('backBtn').style.display = 'flex';
  window.scrollTo(0, 0);
}
function handleBack() {
  if (!S.pageStack.length) return;
  const prev = S.pageStack.pop();
  showPage(prev.id, prev.title, prev.sub || null);
  if (!S.pageStack.length) document.getElementById('backBtn').style.display = 'none';
  if (prev.id === 'orders')  updateHomePage();
  if (prev.id === 'order-list') renderOrderList();
  if (prev.id === 'reports') renderReportList();
  if (prev.id === 'stock') { renderStockGroups(); document.getElementById('stock-group-view').style.display='block'; document.getElementById('stock-items-view').style.display='none'; }
  window.scrollTo(0, 0);
}
function switchMainTab(tab) {
  S.tab = tab; S.pageStack = [];
  document.getElementById('backBtn').style.display = 'none';
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'orders')  { showPage('orders', '首页'); updateHomePage(); }
  if (tab === 'reports') { showPage('reports', '拣货报告'); renderReportList(); }
  if (tab === 'admin')   { showPage('admin',   '后台管理'); renderAdminList(); }
  if (tab === 'stock')   {
    showPage('stock', '库存');
    clearStockGlobalSearch && document.getElementById('stockGlobalSearch') && (document.getElementById('stockGlobalSearch').value = '');
    loadStock().then(renderStockGroups);
  }
  window.scrollTo(0, 0);
}

// ─── HELPERS ─────────────────────────────────────────────
function progress(order) {
  const done = order.items.filter(i => i.status !== 'pending').length;
  return { done, total: order.items.length };
}
function orderStatus(order) {
  const p = progress(order);
  return p.done === 0 ? 'pending' : p.done < p.total ? 'picking' : 'done';
}
function hl(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp('(' + esc + ')', 'gi'), '<span class="highlight">$1</span>');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── ORDER LIST ───────────────────────────────────────────
function renderOrderList() {
  const pending = S.orders.filter(o => orderStatus(o) !== 'done').length;
  document.getElementById('orderCountBadge').textContent = pending + ' 待处理';
  document.getElementById('tab-orders').classList.toggle('has-badge', pending > 0);
  updateHomePage();
  const labels = { pending:'待拣货', picking:'拣货中', done:'已完成' };
  const bc     = { pending:'b-pend', picking:'b-pick', done:'b-done' };
  const activeOrders = S.orders.filter(o => orderStatus(o) !== 'done');
  const html = activeOrders.map(o => {
    const p = progress(o), st = orderStatus(o), pct = Math.round(p.done / p.total * 100);
    return `<div class="card-row" onclick="openOrder('${o.id}')">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
          <span style="font-size:16px;font-weight:600">${o.id}</span>
          <span class="badge ${bc[st]}">${labels[st]}</span>
        </div>
        <div style="font-size:12px;color:var(--text-2)">${p.total} 个品项 · ${o.loadedAt}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--text-3);margin-top:4px">${p.done} / ${p.total} 已处理</div>
      </div>
      <span style="color:var(--text-3);font-size:18px;margin-left:8px">›</span>
    </div>`;
  }).join('');
  document.getElementById('orderListContent').innerHTML = `<div class="card">${html ||
    '<div class="card-plain"><div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">暂无待处理订单</div><div class="empty-sub">所有订单均已完成</div></div></div>'}</div>`;
}

// ─── PICKING ──────────────────────────────────────────────
function openOrder(id) {
  S.currentOrder = id;
  const order = S.orders.find(o => o.id === id);
  pushPage('picking', order.id, order.filename);
  renderPicking();
}
function renderPicking() {
  const order = S.orders.find(o => o.id === S.currentOrder);
  if (!order) return;
  const p = progress(order);
  const out = order.items.filter(i => i.status === 'out').length;
  const sub = order.items.filter(i => i.status === 'sub').length;
  document.getElementById('pickStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-value" style="color:var(--green)">${p.done}</div></div>
    <div class="stat-card"><div class="stat-label">缺货</div><div class="stat-value" style="color:var(--red)">${out}</div></div>
    <div class="stat-card"><div class="stat-label">替代</div><div class="stat-value" style="color:var(--blue)">${sub}</div></div>`;
  document.getElementById('pickItems').innerHTML = order.items.map(item => renderPickItem(item)).join('');
}
function renderPickItem(item) {
  let cls='', badge='<span class="badge b-pend">待拣</span>', body='';
  if (item.status==='done')         { cls='is-done'; badge='<span class="badge b-done">已拣</span>';    body=`<div class="pick-actions"><button class="btn btn-sm btn-ghost" onclick="patchItem(${item.id},'pending')">撤销</button></div>`; }
  else if (item.status==='out')     { cls='is-out';  badge='<span class="badge b-out">缺货</span>';     body=`<div class="pick-actions"><button class="btn btn-sm btn-ghost" onclick="patchItem(${item.id},'pending')">撤销</button></div>`; }
  else if (item.status==='sub')     { cls='is-sub';  badge='<span class="badge b-sub">已替代</span>';   body=`<div class="sub-note">替代：${item.subName}</div><div class="pick-actions" style="margin-top:8px"><button class="btn btn-sm btn-ghost" onclick="patchItem(${item.id},'pending')">撤销</button></div>`; }
  else if (item.status==='entering-sub') { cls='is-sub'; badge='<span class="badge b-sub">输入替代</span>'; body=`<div class="sub-input-row"><input id="si-${item.id}" type="text" placeholder="输入替代商品名称..." onkeydown="if(event.key==='Enter')confirmSub(${item.id})"><button class="btn btn-sm btn-primary" onclick="confirmSub(${item.id})">确认</button><button class="btn btn-sm btn-ghost" onclick="patchItem(${item.id},'pending')">取消</button></div>`; }
  else { body=`<div class="pick-actions"><button class="btn btn-sm btn-success" onclick="patchItem(${item.id},'done')">已拣</button><button class="btn btn-sm btn-warn" onclick="startSub(${item.id})">替代</button><button class="btn btn-sm btn-danger" onclick="patchItem(${item.id},'out')">缺货</button></div>`; }
  return `<div class="pick-item ${cls}" id="pi-${item.id}"><div class="pick-top"><div style="flex:1;min-width:0"><div class="pick-num">${item.numbering}</div><div class="pick-desc">${item.description}</div><div class="pick-meta">User: ${item.user}</div></div><div class="pick-right">${badge}<div class="pick-qty">${item.qty}</div><div class="pick-uom">${item.uom}</div></div></div>${body}</div>`;
}

async function patchItem(itemId, status, subName) {
  const body = { status };
  if (subName) body.subName = subName;
  try {
    await apiFetch(`/api/orders/${S.currentOrder}/items/${itemId}`, {
      method: 'PATCH', body: JSON.stringify(body)
    });
    // SSE will update the UI — but also update local state immediately for responsiveness
    const order = S.orders.find(o => o.id === S.currentOrder);
    const item = order.items.find(i => i.id === itemId);
    item.status = status;
    if (subName) item.subName = subName; else delete item.subName;
    renderPicking();
  } catch (e) { showToast('保存失败，请重试'); }
}

function startSub(itemId) {
  const order = S.orders.find(o => o.id === S.currentOrder);
  const item = order.items.find(i => i.id === itemId);
  item.status = 'entering-sub';
  renderPicking();
  setTimeout(() => { const el = document.getElementById('si-' + itemId); if (el) el.focus(); }, 60);
}
function confirmSub(itemId) {
  const inp = document.getElementById('si-' + itemId);
  const val = inp ? inp.value.trim() : '';
  if (!val) { if (inp) inp.focus(); return; }
  patchItem(itemId, 'sub', val);
}

async function finishPicking() {
  const order = S.orders.find(o => o.id === S.currentOrder);
  const pending = order.items.filter(i => i.status === 'pending').length;
  if (pending > 0 && !confirm(`还有 ${pending} 个品项未处理，确认完成拣货？`)) return;
  try {
    const { report } = await apiFetch('/api/reports', { method: 'POST', body: JSON.stringify({ orderId: S.currentOrder }) });
    S.reports.unshift(report);
    showToast('✓ 报告已生成');
    S.pageStack = [];
    switchMainTab('reports');
  } catch (e) { showToast('生成报告失败，请重试'); }
}

// ─── REPORT LIST ─────────────────────────────────────────
function onSearch(input) {
  S.searchQuery = input.value.trim();
  document.getElementById('searchClear').style.display = S.searchQuery ? 'flex' : 'none';
  renderReportList();
}
function clearSearch() {
  S.searchQuery = ''; document.getElementById('reportSearch').value = '';
  document.getElementById('searchClear').style.display = 'none';
  renderReportList();
}
function renderReportList() {
  const q = S.searchQuery.toLowerCase();
  const meta = document.getElementById('searchMeta');
  const card = document.getElementById('reportListCard');
  if (!S.reports.length) {
    meta.textContent = '';
    card.innerHTML = '<div class="card-plain"><div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无报告</div><div class="empty-sub">完成拣货后自动生成</div></div></div>';
    return;
  }
  const filtered = S.reports.filter(r => {
    if (!q) return true;
    if (r.orderId.toLowerCase().includes(q)) return true;
    return r.items.some(i => i.description.toLowerCase().includes(q) || i.numbering.toLowerCase().includes(q) || i.user.toLowerCase().includes(q) || (i.subName && i.subName.toLowerCase().includes(q)));
  });
  meta.textContent = q ? `找到 ${filtered.length} 笔 · 搜索"${S.searchQuery}"` : `共 ${S.reports.length} 笔报告`;
  if (!filtered.length) { card.innerHTML = '<div class="card-plain" style="text-align:center;padding:24px;color:var(--text-2);font-size:14px">没有符合的报告</div>'; return; }
  card.innerHTML = filtered.map(r => {
    const realIdx = S.reports.indexOf(r);
    const done=r.items.filter(i=>i.status==='done').length, out=r.items.filter(i=>i.status==='out').length, sub=r.items.filter(i=>i.status==='sub').length, pend=r.items.filter(i=>i.status==='pending').length;
    const pills = [done?`<span class="badge b-done">已拣 ${done}</span>`:'', out?`<span class="badge b-out">缺货 ${out}</span>`:'', sub?`<span class="badge b-sub">替代 ${sub}</span>`:'', pend?`<span class="badge b-pend">未处理 ${pend}</span>`:''].filter(Boolean).join('');
    const matchedItems = q ? r.items.filter(i => i.description.toLowerCase().includes(q) || i.numbering.toLowerCase().includes(q) || (i.subName && i.subName.toLowerCase().includes(q))) : [];
    const hint = matchedItems.length ? `<div class="report-match-hint">匹配：${matchedItems.slice(0,2).map(i=>`<b>${i.numbering}</b> ${i.description.substring(0,18)}…`).join('，')}${matchedItems.length>2?` 等${matchedItems.length}项`:''}</div>` : '';
    return `<div class="report-row" onclick="openReportDetail(${realIdx})"><div class="report-row-left"><div class="report-row-id">${hl(r.orderId,S.searchQuery)}</div><div class="report-row-date">${r.finishedAt}</div><div class="report-pills">${pills}</div>${hint}</div><span class="chevron">›</span></div>`;
  }).join('');
}

function openReportDetail(idx) {
  S.currentReport = idx;
  const r = S.reports[idx];
  pushPage('report-detail', r.orderId, r.finishedAt);
  document.getElementById('topbarRight').innerHTML = `<button class="btn btn-sm btn-primary" onclick="exportReport(${idx})">导出</button>`;
  const q = S.searchQuery;
  const done=r.items.filter(i=>i.status==='done'), out=r.items.filter(i=>i.status==='out'), sub=r.items.filter(i=>i.status==='sub'), pend=r.items.filter(i=>i.status==='pending');
  document.getElementById('detailStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">已拣</div><div class="stat-value" style="color:var(--green)">${done.length}</div></div>
    <div class="stat-card"><div class="stat-label">缺货</div><div class="stat-value" style="color:var(--red)">${out.length}</div></div>
    <div class="stat-card"><div class="stat-label">替代</div><div class="stat-value" style="color:var(--blue)">${sub.length}</div></div>`;
  const mkSection = (title, items, extraFn) => {
    if (!items.length) return '';
    const rows = items.map(item => {
      const isMatch = q && (item.description.toLowerCase().includes(q.toLowerCase()) || item.numbering.toLowerCase().includes(q.toLowerCase()) || (item.subName && item.subName.toLowerCase().includes(q.toLowerCase())));
      return `<div class="r-item-row ${isMatch?'hl-row':''}"><div style="flex:1;min-width:0"><div class="r-item-num">${hl(item.numbering,q)}</div><div class="r-item-desc">${hl(item.description,q)}</div>${extraFn?extraFn(item):''}</div><div class="r-item-right"><div class="r-item-qty">${item.qty} ${item.uom}</div><div class="r-item-user">${hl(item.user,q)}</div></div></div>`;
    }).join('');
    return `<div class="r-section-title">${title}</div><div class="card" style="margin-bottom:4px">${rows}</div>`;
  };
  document.getElementById('detailContent').innerHTML =
    mkSection('缺货品项', out,  i=>`<span class="badge b-out" style="margin-top:4px;display:inline-flex">缺货</span>`) +
    mkSection('替代品项', sub,  i=>`<div class="r-item-sub">→ ${hl(i.subName,q)}</div>`) +
    mkSection('正常完成', done, null) +
    mkSection('未处理',   pend, i=>`<span class="badge b-pend" style="margin-top:4px;display:inline-flex">未处理</span>`);
}

// ─── EXPORT ──────────────────────────────────────────────
function exportReport(idx) {
  const r = S.reports[idx];
  if (typeof XLSX === 'undefined') { showToast('XLSX 库未加载'); return; }
  const wb = XLSX.utils.book_new();

  const statusMap = { done:'已拣', out:'缺货', sub:'已替代', pending:'未处理' };

  // Sheet 1: 全部商品明细（只含商品、数量、单位）
  const allHeader = ['Numbering', 'Description', 'Qty', 'UOM', 'User', '状态', '替代商品'];
  const allRows = r.items.map(i => [
    i.numbering, i.description, i.qty, i.uom, i.user,
    statusMap[i.status] || i.status,
    i.subName || ''
  ]);
  const allSheet = XLSX.utils.aoa_to_sheet([allHeader, ...allRows]);
  // Set column widths
  allSheet['!cols'] = [
    {wch:12}, {wch:50}, {wch:8}, {wch:8}, {wch:10}, {wch:8}, {wch:30}
  ];
  XLSX.utils.book_append_sheet(wb, allSheet, '全部明细');

  // Sheet 2: 缺货商品
  const outItems = r.items.filter(i => i.status === 'out');
  if (outItems.length) {
    const outHeader = ['Numbering', 'Description', 'Qty', 'UOM', 'User'];
    const outRows = outItems.map(i => [i.numbering, i.description, i.qty, i.uom, i.user]);
    const outSheet = XLSX.utils.aoa_to_sheet([outHeader, ...outRows]);
    outSheet['!cols'] = [{wch:12},{wch:50},{wch:8},{wch:8},{wch:10}];
    XLSX.utils.book_append_sheet(wb, outSheet, '缺货清单');
  }

  // Sheet 3: 替代商品
  const subItems = r.items.filter(i => i.status === 'sub');
  if (subItems.length) {
    const subHeader = ['Numbering', 'Description', 'Qty', 'UOM', 'User', '替代商品'];
    const subRows = subItems.map(i => [i.numbering, i.description, i.qty, i.uom, i.user, i.subName || '']);
    const subSheet = XLSX.utils.aoa_to_sheet([subHeader, ...subRows]);
    subSheet['!cols'] = [{wch:12},{wch:50},{wch:8},{wch:8},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, subSheet, '替代商品');
  }

  XLSX.writeFile(wb, `${r.orderId}_拣货报告.xlsx`);
  showToast('✓ 报告已导出');
}

      <div style="display:flex;align-items:center;gap:8px"><span class="badge ${bc[st]}">${lb[st]}</span><button class="btn btn-sm btn-danger" onclick="deleteOrder('${o.id}')">删除</button></div>

  }).join('');

async function deleteOrder(id) {
  if (!confirm(`确认删除订单 ${id}？`)) return;
  try {
    await apiFetch(`/api/orders/${id}`, { method: 'DELETE' });
    S.orders = S.orders.filter(o => o.id !== id);
    renderAdminList();
    showToast('✓ 已删除');
  } catch { showToast('删除失败'); }
}

async function handleFileUpload(input) {
  const file = input.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('file', file);
  try {
    const { order } = await fetch(API + '/api/orders/upload', { method: 'POST', body: fd }).then(r => { if (!r.ok) throw new Error(); return r.json(); });
    const idx = S.orders.findIndex(o => o.id === order.id);
    if (idx >= 0) S.orders[idx] = order; else S.orders.unshift(order);
    renderAdminList();
    showToast(`✓ 已导入 ${order.id}（${order.items.length} 品项）`);
  } catch { showToast('上传失败，请检查文件格式'); }
  input.value = '';
}

// ─── INIT ─────────────────────────────────────────────────
(async () => {
  try {
    await Promise.all([loadAll(), loadStock()]);
    updateHomePage();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<div style="text-align:center;padding:32px;color:#A32D2D"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:15px;font-weight:500">无法连接服务器</div><div style="font-size:13px;color:#6b6b67;margin-top:6px">请检查网络或联系管理员</div></div>';
    return;
  }
  document.getElementById('loading').style.display = 'none';
  connectSSE();

  // ── Refresh when app comes back to foreground ──
  async function refreshAll() {
    try {
      await Promise.all([loadAll(), loadStock()]);
      updateHomePage();
      const pg = currentPageId();
      if (pg === 'order-list') renderOrderList();
      if (pg === 'picking')    renderPicking();
      if (S.tab === 'reports' && pg !== 'report-detail') renderReportList();
      if (S.tab === 'stock')   renderStockGroups();
      if (S.tab === 'admin')   renderAdminList();
    } catch {}
    // Reconnect SSE if it dropped
    if (!_sseInstance || _sseInstance.readyState === EventSource.CLOSED) {
      connectSSE();
    }
  }

  // Page Visibility API — fires when switching away and back
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') refreshAll();
  });

  // iOS Safari PWA: also fires on resume from background
  window.addEventListener('pageshow', e => {
    if (e.persisted) refreshAll();
  });

  // Fallback: reconnect SSE if it silently died (check every 30s)
  setInterval(() => {
    if (!_sseInstance || _sseInstance.readyState === EventSource.CLOSED) {
      connectSSE();
    }
  }, 30000);

})();

// ─── STOCK ───────────────────────────────────────────────
let stockState = { group: null, category: null, searchQuery: '', items: [], updatedAt: null, filename: null };

async function loadStock() {
  try {
    const data = await apiFetch('/api/stock');
    stockState.items     = data.items     || [];
    stockState.updatedAt = data.updatedAt || null;
    stockState.filename  = data.filename  || null;
  } catch { stockState.items = []; }
}

function renderStockGroups() {
  document.getElementById('stock-group-view').style.display = 'block';
  document.getElementById('stock-items-view').style.display = 'none';
  // Reset global search state
  const gsr = document.getElementById('stockGlobalResults');
  const gss = document.getElementById('stockGroupSection');
  const gsm = document.getElementById('stockGlobalSearchMeta');
  if (gsr) gsr.style.display = 'none';
  if (gss) gss.style.display = 'block';
  if (gsm) gsm.textContent = '';

  if (!stockState.items.length) {
    document.getElementById('stockGroupList').innerHTML =
      '<div class="card-plain"><div class="empty-state"><div class="empty-icon">🗄️</div><div class="empty-text">暂无库存数据</div><div class="empty-sub">请在管理页上传库存 Excel</div></div></div>';
    return;
  }

  const groups = {};
  stockState.items.forEach(i => { groups[i.group] = (groups[i.group] || 0) + 1; });

  const meta = stockState.updatedAt
    ? `<div style="font-size:12px;color:var(--text-2);padding:0 16px 10px">上次更新：${stockState.updatedAt}　共 ${stockState.items.length} 个商品</div>`
    : '';

  const rows = Object.entries(groups)
    .sort((a,b) => b[1] - a[1])
    .map(([g, count]) => `<div class="card-row" onclick="openStockGroup('${encodeURIComponent(g)}')">
      <div style="flex:1">
        <div style="font-size:15px;font-weight:500;color:var(--text)">${g}</div>
        <div style="font-size:12px;color:var(--text-2);margin-top:2px">${count} 个商品</div>
      </div>
      <span style="color:var(--text-3);font-size:18px">›</span>
    </div>`).join('');

  document.getElementById('stockGroupList').innerHTML = meta + `<div class="card">${rows}</div>`;
}

function openStockGroup(encodedGroup) {
  const group = decodeURIComponent(encodedGroup);
  stockState.group = group;
  stockState.category = null;
  stockState.searchQuery = '';
  document.getElementById('stockSearch').value = '';
  document.getElementById('stockSearchClear').style.display = 'none';
  document.getElementById('stock-group-view').style.display = 'none';
  document.getElementById('stock-items-view').style.display = 'block';
  document.getElementById('topbarTitle').textContent = group;
  document.getElementById('backBtn').style.display = 'flex';
  S.pageStack.push({ id: 'stock', title: '库存', sub: null });
  renderStockItems();
  window.scrollTo(0, 0);
}

function renderStockItems() {
  const q = stockState.searchQuery.toLowerCase();
  let items = stockState.items.filter(i => i.group === stockState.group);
  if (q) items = items.filter(i => i.name.toLowerCase().includes(q) || i.code.toLowerCase().includes(q));
  document.getElementById('stockSearchMeta').textContent = q ? `找到 ${items.length} 个商品` : `共 ${items.length} 个商品`;
  if (!items.length) {
    document.getElementById('stockItemsList').innerHTML = '<div class="card-plain" style="text-align:center;padding:24px;color:var(--text-2);font-size:14px">没有符合的商品</div>';
    return;
  }
  document.getElementById('stockItemsList').innerHTML = '<div class="card">' + items.map(item => {
    const qtyColor = item.qty <= 0 ? 'var(--red)' : item.qty <= 10 ? 'var(--amber)' : 'var(--green)';
    const qtyLabel = item.qty <= 0 ? '缺货' : item.qty <= 10 ? '库存偏低' : '库存充足';
    return `<div style="padding:12px 16px;border-bottom:0.5px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:600;color:var(--green);margin-bottom:2px">${item.code}</div>
          <div style="font-size:14px;font-weight:500;color:var(--text);line-height:1.35">${item.name}</div>
          <div style="font-size:11px;color:var(--text-2);margin-top:3px">UOM: ${item.uom}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px;font-weight:700;color:${qtyColor}">${item.qty % 1 === 0 ? item.qty : item.qty.toFixed(1)}</div>
          <div style="font-size:10px;color:${qtyColor};font-weight:500">${qtyLabel}</div>
        </div>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function onStockGlobalSearch(input) {
  const q = input.value.trim();
  document.getElementById('stockGlobalSearchClear').style.display = q ? 'flex' : 'none';
  if (!q) {
    document.getElementById('stockGlobalResults').style.display = 'none';
    document.getElementById('stockGroupSection').style.display = 'block';
    document.getElementById('stockGlobalSearchMeta').textContent = '';
    return;
  }
  const ql = q.toLowerCase();
  const results = stockState.items.filter(i =>
    i.name.toLowerCase().includes(ql) || i.code.toLowerCase().includes(ql)
  );
  document.getElementById('stockGroupSection').style.display = 'none';
  document.getElementById('stockGlobalResults').style.display = 'block';
  document.getElementById('stockGlobalSearchMeta').textContent = `找到 ${results.length} 个商品`;
  if (!results.length) {
    document.getElementById('stockGlobalList').innerHTML =
      '<div class="card-plain" style="text-align:center;padding:24px;color:var(--text-2);font-size:14px">没有符合的商品</div>';
    return;
  }
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const hlFn = text => String(text).replace(new RegExp('(' + esc + ')', 'gi'), '<span class="highlight">$1</span>');
  document.getElementById('stockGlobalList').innerHTML = '<div class="card">' + results.map(item => {
    const qtyColor = item.qty <= 0 ? 'var(--red)' : item.qty <= 10 ? 'var(--amber)' : 'var(--green)';
    const qtyLabel = item.qty <= 0 ? '缺货' : item.qty <= 10 ? '库存偏低' : '库存充足';
    return `<div style="padding:12px 16px;border-bottom:0.5px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:600;color:var(--green);margin-bottom:2px">${hlFn(item.code)}</div>
          <div style="font-size:14px;font-weight:500;color:var(--text);line-height:1.35">${hlFn(item.name)}</div>
          <div style="font-size:11px;color:var(--text-2);margin-top:3px">${item.group} · UOM: ${item.uom}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px;font-weight:700;color:${qtyColor}">${item.qty % 1 === 0 ? item.qty : item.qty.toFixed(1)}</div>
          <div style="font-size:10px;color:${qtyColor};font-weight:500">${qtyLabel}</div>
        </div>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function clearStockGlobalSearch() {
  document.getElementById('stockGlobalSearch').value = '';
  document.getElementById('stockGlobalSearchClear').style.display = 'none';
  document.getElementById('stockGlobalResults').style.display = 'none';
  document.getElementById('stockGroupSection').style.display = 'block';
  document.getElementById('stockGlobalSearchMeta').textContent = '';
}

function onStockSearch(input) {
  stockState.searchQuery = input.value.trim();
  document.getElementById('stockSearchClear').style.display = stockState.searchQuery ? 'flex' : 'none';
  renderStockItems();
}
function clearStockSearch() {
  stockState.searchQuery = '';
  document.getElementById('stockSearch').value = '';
  document.getElementById('stockSearchClear').style.display = 'none';
  renderStockItems();
}


async function handleStockUpload(input) {
  const file = input.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('file', file);
  try {
    const result = await fetch(API + '/api/stock/upload', { method: 'POST', body: fd }).then(r => { if (!r.ok) throw new Error(); return r.json(); });
    showToast(`✓ 库存已更新（${result.count} 个商品）`);
    await loadStock();
    updateAdminStockInfo();
  } catch { showToast('上传失败，请检查文件格式'); }
  input.value = '';
}

function updateAdminStockInfo() {
  const el = document.getElementById('adminStockInfo');
  const content = document.getElementById('adminStockInfoContent');
  if (!el || !content) return;
  if (stockState.items.length) {
    el.style.display = 'block';
    content.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:14px;font-weight:500;color:var(--text)">${stockState.filename || '库存文件'}</div>
        <div style="font-size:12px;color:var(--text-2);margin-top:2px">共 ${stockState.items.length} 个商品 · ${stockState.updatedAt || ''}</div>
      </div>
      <span class="badge b-done">已载入</span>
    </div>`;
  } else {
    el.style.display = 'none';
  }
}


function goToOrders() {
  S.pageStack.push({ id: 'orders', title: '首页', sub: null });
  showPage('order-list', '待拣订单');
  document.getElementById('backBtn').style.display = 'flex';
  renderOrderList();
  window.scrollTo(0, 0);
}

function goToReports() {
  S.pageStack.push({ id: 'orders', title: '首页', sub: null });
  showPage('reports', '拣货报告');
  document.getElementById('backBtn').style.display = 'flex';
  renderReportList();
  window.scrollTo(0, 0);
}

function updateHomePage() {
  const pending  = S.orders.filter(o => orderStatus(o) !== 'done').length;
  const active   = S.orders.filter(o => orderStatus(o) !== 'done').length;
  const badge    = document.getElementById('homeOrderBadge');
  const sub      = document.getElementById('homeOrderSub');
  const rSub     = document.getElementById('homeReportSub');
  const tabDot   = document.getElementById('tab-orders');
  if (sub)   sub.textContent = active ? `${active} 个订单待处理` : '暂无待处理订单';
  if (badge) { badge.textContent = pending; badge.style.display = pending > 0 ? 'inline-flex' : 'none'; }
  if (rSub)  rSub.textContent = S.reports.length ? `共 ${S.reports.length} 笔报告` : '暂无报告';
  if (tabDot) tabDot.classList.toggle('has-badge', pending > 0);
}

</script>
</body>
</html>
